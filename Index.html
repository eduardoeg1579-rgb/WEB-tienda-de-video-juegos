<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Consolas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Consolas de Videojuegos</h1>
    </header>

    <main class="container">
        <section class="console-card">
            <div class="image-container">
                <img src="ps4.jpg" alt="PlayStation 4 Estática">
            </div>
            <div class="info">
                <h2>PlayStation 4</h2>
                <p>Explora el catálogo de una de las consolas más exitosas de Sony con gráficos en alta definición.</p>
            </div>
        </section>

        <section class="console-card">
            <div class="image-container">
                <img src="xbox.jpg" alt="Xbox Series X Estática">
            </div>
            <div class="info">
                <h2>Xbox Series X</h2>
                <p>La consola más potente de Microsoft, diseñada para ofrecer velocidad y rendimiento de nueva generación.</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Catálogo de Videojuegos</p>
    </footer>
</body>
</html>
